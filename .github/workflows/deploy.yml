name: Deploy to Tencent COS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        run: >
          coscmd config
          -a ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          -s ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          -b ${{ secrets.COS_BUCKET }}
          -r ${{ secrets.COS_REGION }}

      - name: Sync to COS (incremental)
        run: coscmd sync -r out/ / --delete
