name: Deploy to Tencent COS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup coscli
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64 -O coscli
          chmod +x coscli

      - name: Configure coscli
        run: |
          cat > ~/.cos.yaml <<EOF
          cos:
            base:
              secretid: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
              secretkey: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
              sessiontoken: ""
            buckets:
              - name: ${{ secrets.COS_BUCKET }}
                alias: blog
                region: ${{ secrets.COS_REGION }}
          EOF

      - name: Sync to COS (incremental)
        run: ./coscli sync out/ cos://blog/ -r --delete --force
